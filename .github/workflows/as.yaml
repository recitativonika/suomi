name: AS

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  asf:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore encrypted ASF state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: config
          key: asf-encrypted-v4-${{ github.ref }}
          restore-keys: asf-encrypted-v4-

      - name: Ensure config 
        run: mkdir -p config

      - name: Install gpg
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Decrypt
        env:
          PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        run: |
          cd config
          shopt -s nullglob   # supaya loop tidak error kalau tidak ada file
          for file in *.gpg; do
            output="${file%.gpg}"
            echo "Decrypting $file → $output"
            gpg --batch --yes --passphrase "$PASSPHRASE" --decrypt --output "$output" "$file" || echo "Decrypt failed for $file (wrong passphrase or corrupt file?)"
          done

      - name: Run ArchiSteamFarm 3 Jam
        run: |
          timeout --preserve-status --signal=SIGTERM 10800s \
            docker run --rm \
              -v ${{ github.workspace }}/config:/app/config \
              ghcr.io/justarchinet/asf:latest \
              --no-ui --headless --no-restart || true

      - name: Re-encrypt
        env:
          PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        run: |
          cd config
          shopt -s nullglob
          for file in *.json *.db; do
            if [ -f "$file" ]; then
              echo "Encrypting $file → ${file}.gpg"
              gpg --batch --yes --symmetric --cipher-algo AES256 \
                --passphrase "$PASSPHRASE" --output "${file}.gpg" "$file" || echo "Encrypt failed for $file"
              # Opsional: rm "$file" kalau mau hapus plaintext setelah encrypt
            fi
          done

      - name: Save encrypted
        uses: actions/cache/save@v4
        if: always()
        with:
          path: config
          key: asf-encrypted-v4-${{ github.ref }}
