name: AFARM

on:
  schedule:
    - cron: '0 2 * * *'          # jam 02:00 WIB tiap hari
  workflow_dispatch:

jobs:
  afarm:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore encrypted ASF state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: config
          key: asf-encrypted-v4-${{ github.ref }}
          restore-keys: asf-encrypted-v4-

      - name: Ensure config and plugins directories exist
        run: |
          mkdir -p config plugins

      - name: Install gpg and jq
        run: sudo apt-get update && sudo apt-get install -y gnupg jq

      - name: Decrypt config files (if any)
        env:
          PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        run: |
          cd config
          shopt -s nullglob
          for file in *.gpg; do
            output="${file%.gpg}"
            echo "Decrypting $file → $output"
            gpg --batch --yes --passphrase "$PASSPHRASE" --decrypt --output "$output" "$file" || echo "Decrypt failed for $file"
          done

      - name: Run AFARM
        id: run_asf
        run: |
          timeout --preserve-status --signal=SIGTERM 10800s \
            docker run --rm \
              -v ${{ github.workspace }}/config:/app/config \
              -v ${{ github.workspace }}/plugins:/app/plugins \
              justarchi/archisteamfarm:latest \
              --no-ui --headless --no-restart 2>&1 | tee asf_log.txt || true

      - name: Send AFARM 
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.ASF_WEBHOOK_DISCORD }}
        run: |
          if [ ! -f asf_log.txt ]; then
            echo "No log file found, skipping Discord send."
            exit 0
          fi

          split -b 1900k asf_log.txt log_chunk_

          for chunk in log_chunk_*; do
            if [ -s "$chunk" ]; then
              LOG_CONTENT=$(cat "$chunk" | sed 's/"/\\"/g' | tr '\n' '\\n')
              curl -H "Content-Type: application/json" \
                -X POST \
                -d "{\"content\": \"**AFARM Log Part** (Run: ${{ github.run_id }})\n\`\`\`\\n${LOG_CONTENT}\n\`\`\`\"}" \
                "$WEBHOOK_URL" || echo "Failed to send chunk $chunk"
            fi
          done

          rm -f log_chunk_* asf_log.txt

      - name: Re-encrypt config files (only if files exist)
        env:
          PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        run: |
          cd config
          shopt -s nullglob
          for file in *.json *.db; do
            if [ -f "$file" ]; then
              echo "Encrypting $file → ${file}.gpg"
              gpg --batch --yes --symmetric --cipher-algo AES256 \
                --passphrase "$PASSPHRASE" --output "${file}.gpg" "$file" || echo "Encrypt failed for $file"
            fi
          done

      - name: Save encrypted ASF state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: config
          key: asf-encrypted-v4-${{ github.ref }}
