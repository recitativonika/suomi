name: Upshift

on:
  schedule:
    - cron: '0 12,18,0,6 * * *'
  workflow_dispatch:

jobs:
  run-upshift-main:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Decrypt Files
      env:
        SCRIPT_PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
      run: |
        gpg --quiet --batch --yes --decrypt --passphrase="$SCRIPT_PASSPHRASE" --output upshift.py upshift.py.gpg
        gpg --quiet --batch --yes --decrypt --passphrase="$SCRIPT_PASSPHRASE" --output upshift.txt upshift.txt.gpg

    - name: Run Script (Main)
      env:
        WEBHOOK_UPSHIFT: ${{ secrets.WEBHOOK_UPSHIFT }}
        DISCORD_UPSHIFTY: ${{ secrets.DISCORD_UPSHIFTY }}
        JOB_TYPE: main
        BOT_LABEL: Main VM
      run: |
        python upshift.py > /dev/null 2>&1

    - name: Cleanup Secrets and Logs
      if: always()
      run: |
        rm -f upshift.py upshift.txt
        echo "Cleanup completed successfully."

  prepare-secondary:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Decrypt & Generate Matrix chunks
      id: set-matrix
      env:
        SCRIPT_PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
      run: |
        gpg --quiet --batch --yes --decrypt --passphrase="$SCRIPT_PASSPHRASE" --output upshiftsec.txt upshiftsec.txt.gpg
        
        sed -i '/^$/d' upshiftsec.txt || true
        LINES=$(awk 'NF' upshiftsec.txt | wc -l)
        
        echo "Found $LINES wallets in upshiftsec.txt"
        
        if [ "$LINES" -eq 0 ]; then
          echo "matrix={\"chunk\":[]}" >> "$GITHUB_OUTPUT"
        else
          CHUNKS=$(awk -v lines=$LINES 'BEGIN { printf "[" ; for(i=0; i<lines; i+=5) { printf "%d%s", i/5, (i+5<lines ? "," : "") } printf "]" }')
          echo "matrix={\"chunk\":$CHUNKS}" >> "$GITHUB_OUTPUT"
        fi

  run-upshift-secondary:
    needs: prepare-secondary
    if: ${{ needs.prepare-secondary.outputs.matrix != '{"chunk":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare-secondary.outputs.matrix) }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Decrypt Files & Extract 5 Wallets
      env:
        SCRIPT_PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        CHUNK: ${{ matrix.chunk }}
      run: |
        gpg --quiet --batch --yes --decrypt --passphrase="$SCRIPT_PASSPHRASE" --output upshift.py upshift.py.gpg
        gpg --quiet --batch --yes --decrypt --passphrase="$SCRIPT_PASSPHRASE" --output upshiftsec.txt upshiftsec.txt.gpg
        
        sed -i '/^$/d' upshiftsec.txt
        
        START=$((CHUNK * 5 + 1))
        END=$((START + 4))
        
        sed -n "${START},${END}p" upshiftsec.txt > upshift.txt
        echo "START_INDEX=$START" >> $GITHUB_ENV

    - name: Run Script (Secondary Chunk ${{ matrix.chunk }})
      env:
        WEBHOOK_UPSHIFT: ${{ secrets.WEBHOOK_UPSHIFT }}
        DISCORD_UPSHIFTY: ${{ secrets.DISCORD_UPSHIFTY }}
        JOB_TYPE: secondary
        BOT_LABEL: Secondary VM
      run: |
        python upshift.py > /dev/null 2>&1

    - name: Cleanup Secrets and Logs
      if: always()
      run: |
        rm -f upshift.py upshift.txt upshiftsec.txt
        echo "Cleanup completed successfully."
