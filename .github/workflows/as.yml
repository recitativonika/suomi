name: AFARM

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  afarm:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Check Repository File Update
        run: |
          mkdir -p config
          if [ -f "config/as.zip.gpg" ]; then
            git hash-object config/as.zip.gpg > /tmp/current_repo_hash.txt
            cp config/as.zip.gpg /tmp/repo_as.zip.gpg
          fi

      - id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: config
          key: asf-state-${{ github.run_id }}
          restore-keys: |
            asf-state-

      - name: Smart Cache Override
        run: |
          if [ -f "/tmp/current_repo_hash.txt" ]; then
            REPO_HASH=$(cat /tmp/current_repo_hash.txt)
            CACHED_HASH=""
            if [ -f "config/repo_hash.txt" ]; then
              CACHED_HASH=$(cat config/repo_hash.txt)
            fi
            
            if [ "$REPO_HASH" != "$CACHED_HASH" ]; then
              echo "🚀 NEW as.zip.gpg detected in repository! Ignoring old cache."
              rm -rf config/*
              cp /tmp/repo_as.zip.gpg config/as.zip.gpg
            else
              echo "♻️ No update from repository. Resuming progress from cache."
            fi
          fi

      - run: mkdir -p config plugins

      - run: sudo apt-get update && sudo apt-get install -y gnupg jq zip unzip

      - env:
          PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        run: |
          cd config
          if [ -f "as.zip.gpg" ]; then
            gpg --batch --yes --passphrase "$PASSPHRASE" --decrypt --output as.zip as.zip.gpg || true
            if [ -f "as.zip" ]; then
              unzip -o as.zip || true
              rm as.zip
            fi
          fi

      - env:
          WEBHOOK_URL: ${{ secrets.ASF_WEBHOOK_DISCORD }}
        run: |
          touch asf_log.txt
          START_TIME=$(TZ='Asia/Jakarta' date +'(%d/%m/%Y) %I:%M %p GMT+7')
          jq -n --arg content "🚀 **AFARM Started** at $START_TIME" '{content: $content}' > start_payload.json
          curl -s -H "Content-Type: application/json" -X POST -d @start_payload.json "$WEBHOOK_URL" > /dev/null || true
          rm -f start_payload.json

          (
            last_line=0
            while true; do
              sleep 60
              if [ -f asf_log.txt ]; then
                current_line=$(wc -l < asf_log.txt)
                if [ "$current_line" -gt "$last_line" ]; then
                  tail -n +$((last_line + 1)) asf_log.txt > temp_chunk.txt
                  last_line=$current_line
                  split -C 1800 temp_chunk.txt log_part_ 2>/dev/null || true
                  for part in log_part_*; do
                    if [ -s "$part" ]; then
                      jq -Rs --arg prefix "📋 **Live Log**" '{content: ($prefix + "\n```text\n" + . + "\n```")}' "$part" > payload.json
                      curl -s -H "Content-Type: application/json" -X POST -d @payload.json "$WEBHOOK_URL" > /dev/null || true
                      sleep 2
                    fi
                  done
                  rm -f log_part_* temp_chunk.txt payload.json
                fi
              fi
            done
          ) &
          LOGGER_PID=$!

          timeout --preserve-status --signal=SIGTERM 17700s \
            docker run --rm \
              -v ${{ github.workspace }}/config:/app/config \
              -v ${{ github.workspace }}/plugins:/app/plugins \
              justarchi/archisteamfarm:latest \
              --no-ui --headless --no-restart 2>&1 | \
              grep --line-buffered -vE "═|█|╔|╚|║|====|Pulling from|Pulling fs layer|Waiting|Verifying Checksum|Download complete|Pull complete|Digest:|Status: Downloaded" | \
              grep --line-buffered -v "|ASFEnhance|插件作者|爱发电|未加载外部模块|" > asf_log.txt || true

          kill $LOGGER_PID || true
          jq -n --arg content "✅ **AFARM Finished for this session.**" '{content: $content}' > end_payload.json
          curl -s -H "Content-Type: application/json" -X POST -d @end_payload.json "$WEBHOOK_URL" > /dev/null || true

      - if: always()
        env:
          PASSPHRASE: ${{ secrets.SCRIPT_PASSPHRASE }}
        run: |
          sudo chown -R $(whoami):$(whoami) config
          sudo chmod -R 777 config
          
          cd config
          shopt -s extglob nullglob
          files=(!(as.zip.gpg|repo_hash.txt))
          
          if [ ${#files[@]} -gt 0 ]; then
            zip -r as.zip "${files[@]}"
            if [ -f "as.zip" ]; then
              gpg --batch --yes --symmetric --cipher-algo AES256 --passphrase "$PASSPHRASE" --output as.zip.gpg as.zip || true
              rm as.zip
            fi
            rm -rf "${files[@]}"
          fi
          
          if [ -f "/tmp/current_repo_hash.txt" ]; then
            cp /tmp/current_repo_hash.txt repo_hash.txt
          fi

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: config
          key: asf-state-${{ github.run_id }}
