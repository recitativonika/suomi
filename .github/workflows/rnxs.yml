name: rnxs-single-node

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-rnxs-group:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        group: [1]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q >/dev/null 2>&1
          sudo apt-get install -y -q expect curl jq wget >/dev/null 2>&1

      - name: Prepare Script
        run: |
          chmod +x rnxs.sh

      - name: Prepare chunk
        run: |
          CHUNK_SIZE=1
          START=$(( (${{ matrix.group }} - 1) * CHUNK_SIZE + 1 ))
          END=$(( ${{ matrix.group }} * CHUNK_SIZE ))
          awk "NR>=$START && NR<=$END" nid.txt > group_nid_${{ matrix.group }}.txt 2>/dev/null || true

      - name: Run script
        env:
          WEBHOOK_1: ${{ secrets.WEBHOOK_1 }}
          WEBHOOK_2: ${{ secrets.WEBHOOK_2 }}
          WEBHOOK_3: ${{ secrets.WEBHOOK_3 }}
          REFRESH_SUCCESS_TARGET: 2
          REFRESH_ACCUMULATE: 1
          CONCURRENCY: 1
          LOOP_MODE: "once"
          LOG_MODE: "logfull"
          SEND_DISCORD: 1
          MODE: "live"
          NID: group_nid_${{ matrix.group }}.txt
        run: |
          [ -s "group_nid_${{ matrix.group }}.txt" ] && ./rnxs.sh ${{ matrix.group }} || true

      - name: Single notification
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_1 }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d '{"content":"✅ Workflow 1 VM 1 Node success"}' \
            "$WEBHOOK_URL" >/dev/null 2>&1 || true

      - name: Cleanup
        if: always()
        run: |
          rm -f group_nid_*.txt
          rm -f /tmp/nexus_* /tmp/*.log
          rm -f rnxs.sh
          rm -rf /home/runner/.nexus/bin/nexus-network
          true
